[graph]
targets = []
all-features = true

[advisories]
version = 2
yanked = "deny"
# Temporary exceptions for rustls-webpki advisories while the
# upstream rustls/tokio-tungstenite/serenity dependency chain catches up.
#
# RUSTSEC-2024-0388: `derivative` is unmaintained — pulled only transitively via
#   matrix-sdk-indexeddb; no first-party use.
# RUSTSEC-2026-0097: `rand` unsound with a custom logger using `rand::rng()` —
#   transitive via the Matrix/OTLP stacks; not how we use rand.
# RUSTSEC-2026-0173: `proc-macro-error2` is unmaintained — compile-time-only
#   proc macro pulled transitively via teloxide -> aquamarine; no runtime code.
ignore = [
  "RUSTSEC-2026-0049",
  "RUSTSEC-2026-0098",
  "RUSTSEC-2026-0099",
  "RUSTSEC-2024-0388",
  "RUSTSEC-2026-0097",
  "RUSTSEC-2026-0173",
]

[bans]
# The current graph includes several unavoidable duplicate transitive versions
# across Matrix, Telegram, and OTLP stacks; keep bans focused on actual risks.
multiple-versions = "allow"
wildcards = "deny"
deny = []
skip = []
skip-tree = []

[licenses]
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "BSL-1.0",
  "CDLA-Permissive-2.0",
  "ISC",
  "MPL-2.0",
  "Unicode-3.0",
  "Zlib",
]
confidence-threshold = 0.8
